<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI-Powered Sustainability Analytics — Interactive Demo</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-NQBJRG7BR6"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-NQBJRG7BR6');</script>
<script>(function(c,l,a,r,i,t,y){c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y)})(window,document,"clarity","script","YOUR_CLARITY_ID");</script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0c0f13;--panel:#141820;--card:#1a1f2a;--surface:#232a38;--bright:#eef0f4;--main:#c4c9d4;--muted:#6b7280;--dim:#4a5060;--accent:#34d399;--accentDim:rgba(52,211,153,.12);--accentGlow:rgba(52,211,153,.25);--blue:#60a5fa;--blueDim:rgba(96,165,250,.12);--amber:#fbbf24;--coral:#f87171;--border:rgba(255,255,255,.06);--borderAccent:rgba(52,211,153,.3);--r:12px;--rs:8px;--f:'DM Sans',system-ui,sans-serif;--m:'DM Mono',Consolas,monospace}
body{font-family:var(--f);background:var(--bg);color:var(--main);display:flex;height:100vh}
.sidebar{width:280px;min-width:280px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:sticky;top:0}
.sidebar-hd{padding:24px 20px 16px;border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.logo-i{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),#059669);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:600;color:#fff}
.logo-t{font-size:13px;font-weight:500;color:var(--bright);line-height:1.3}.logo-t span{display:block;font-size:11px;color:var(--muted);font-weight:400}
.tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:10px;font-family:var(--m);padding:3px 8px;border-radius:20px;border:1px solid var(--border);color:var(--muted)}.tag-r{border-color:rgba(96,165,250,.3);color:var(--blue)}.tag-e{border-color:rgba(251,191,36,.3);color:var(--amber)}
.beats{flex:1;overflow-y:auto;padding:14px 10px;scrollbar-width:thin;scrollbar-color:var(--surface) transparent}
.bi{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:var(--rs);cursor:pointer;transition:all .15s;margin-bottom:3px}
.bi:hover{background:var(--card)}.bi.a{background:var(--accentDim)}.bi.a .bn{background:var(--accent);color:var(--bg)}.bi.v .bn{border-color:var(--accent);color:var(--accent)}
.bn{width:26px;height:26px;min-width:26px;border-radius:50%;background:var(--surface);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--muted);transition:all .2s}
.bl{font-size:12px;color:var(--muted);line-height:1.3}.bi.a .bl{color:var(--bright)}.bi.v .bl{color:var(--main)}
.sidebar-ft{padding:14px 20px;border-top:1px solid var(--border);font-size:11px;color:var(--dim);line-height:1.5}.sidebar-ft a{color:var(--accent);text-decoration:none}
.main{flex:1;display:flex;flex-direction:column;min-width:0;height:100vh;overflow:hidden}
.hdr{padding:12px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--panel);flex-shrink:0}
.hdr-l{font-size:12px;font-family:var(--m);color:var(--muted)}.hdr-l strong{color:var(--accent)}
.nav{display:flex;gap:8px}
.nb{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--rs);border:1px solid var(--border);background:0;color:var(--muted);font-family:var(--f);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.nb:hover{background:var(--card);color:var(--bright)}.nb:disabled{opacity:.3;cursor:default}.nb:disabled:hover{background:0;color:var(--muted)}
.nb-p{background:var(--accentDim);border-color:var(--borderAccent);color:var(--accent)}.nb-p:hover{background:var(--accentGlow)}
.chat{flex:1;overflow-y:auto;padding:28px 32px;scrollbar-width:thin;scrollbar-color:var(--surface) transparent}
.beat{max-width:820px;margin:0 auto}
.umsg{display:flex;justify-content:flex-end;margin-bottom:20px}
.ub{background:var(--surface);border:1px solid var(--border);border-radius:18px 18px 4px 18px;padding:10px 18px;max-width:480px;font-size:14px;color:var(--bright);line-height:1.4}
.ai-hd{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.av{width:26px;height:26px;background:linear-gradient(135deg,var(--accent),#059669);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff}
.an{font-size:13px;font-weight:500;color:var(--bright)}.an span{color:var(--muted);font-weight:400;margin-left:5px}
.ai-txt{font-size:14px;color:var(--main);line-height:1.7;padding-left:35px;margin-bottom:16px}
.ai-txt strong{color:var(--bright);font-weight:500}
.hl{color:var(--accent);font-weight:500}.hl-b{color:var(--blue);font-weight:500}.hl-c{color:var(--coral);font-weight:500}
.ag{display:inline-flex;align-items:center;font-size:10px;font-family:var(--m);padding:2px 6px;border-radius:12px;vertical-align:middle}
.ag-r{background:var(--blueDim);color:var(--blue);border:1px solid rgba(96,165,250,.2)}
.ag-e{background:rgba(251,191,36,.12);color:var(--amber);border:1px solid rgba(251,191,36,.2)}
.vf{margin-left:35px;border-radius:var(--r);overflow:hidden;border:1px solid var(--border);background:#fff;position:relative;margin-bottom:24px}
.vf iframe{border:none;display:block;width:100%}
.vl{position:absolute;top:8px;right:8px;font-size:10px;font-family:var(--m);padding:2px 8px;border-radius:12px;background:rgba(0,0,0,.65);color:rgba(255,255,255,.65);z-index:2}
.hero-w{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 52px);padding:24px}
.hero{max-width:560px;text-align:center}
.hero-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-family:var(--m);padding:5px 14px;border-radius:20px;border:1px solid var(--borderAccent);color:var(--accent);margin-bottom:20px}
.hero-badge::before{content:'';width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.hero h1{font-size:34px;font-weight:600;color:var(--bright);line-height:1.2;margin-bottom:14px;letter-spacing:-.5px}.hero h1 em{font-style:normal;color:var(--accent)}
.hero p{font-size:15px;color:var(--muted);line-height:1.7;margin-bottom:28px}
.hero-btn{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;border-radius:var(--r);background:var(--accent);color:var(--bg);font-family:var(--f);font-size:15px;font-weight:600;border:none;cursor:pointer;transition:all .25s}
.hero-btn:hover{transform:translateY(-1px);box-shadow:0 8px 28px var(--accentGlow)}
.hero-meta{display:flex;justify-content:center;gap:28px;margin-top:36px;font-size:12px;color:var(--dim)}.hero-meta div{display:flex;flex-direction:column;gap:3px}.hero-meta strong{color:var(--muted);font-size:17px;font-weight:500}
.kh{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:12px;align-items:center;font-size:10px;color:var(--dim);background:var(--panel);padding:6px 16px;border-radius:14px;border:1px solid var(--border);z-index:100;opacity:0;transition:opacity .4s}.kh.show{opacity:1}
kbd{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 4px;background:var(--surface);border:1px solid var(--border);border-radius:3px;font-family:var(--m);font-size:9px;color:var(--muted)}
@media(max-width:900px){.sidebar{display:none}.chat{padding:16px}.vf{margin-left:0}.ai-txt{padding-left:0}.hero h1{font-size:26px}}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-hd">
    <div class="logo"><div class="logo-i">S</div><div class="logo-t">Sustainability Analytics<span>Conversational AI Demo</span></div></div>
    <div class="tags"><span class="tag tag-r">Revenue Agent</span><span class="tag tag-e">Emissions Agent</span><span class="tag">Microsoft Fabric</span><span class="tag">Claude AI</span></div>
  </div>
  <div class="beats" id="beatList"></div>
  <div class="sidebar-ft">Powered by <a href="#">Microsoft Fabric</a> Data Agents + <a href="#">Claude AI</a><br>Demo data for illustrative purposes</div>
</aside>
<main class="main">
  <header class="hdr">
    <div class="hdr-l" id="ctr"><strong>Start</strong></div>
    <div class="nav"><button class="nb" id="prevBtn" disabled onclick="go(-1)">&larr; Back</button><button class="nb nb-p" id="nextBtn" onclick="go(1)">Next &rarr;</button></div>
  </header>
  <div class="chat" id="chat"></div>
</main>
<div class="kh" id="kh"><kbd>&rarr;</kbd> Next <kbd>&larr;</kbd> Back <kbd>Esc</kbd> Reset</div>
<script>
var B=[
  {t:'hero'},
  {q:'Show revenue by division',a:'r',txt:'<strong>Revenue by Division</strong> \u2014 data from the Fabric Revenue Data Agent. Powertrain & Chassis dominates with <span class="hl-b">\u20ac8.9B (37.9%)</span>, followed by Bearings & Industrial at <span class="hl-b">\u20ac6.4B</span>. Together nearly two-thirds of the portfolio.',v:'visuals/revenue_by_division_overview.html',h:650},
  {q:'Which division is the biggest emitter?',a:'e',txt:'<span class="ag ag-e">Emissions Agent</span> enters. <strong>Powertrain & Chassis</strong>: <span class="hl-c">4,183 kt CO\u2082e (39.7%)</span>. <strong>Vehicle Lifetime Sol.</strong>: <span class="hl">1,125 kt (10.7%)</span>. Powertrain emits <strong>3.7\u00d7 more</strong> but only 2.9\u00d7 more revenue.',v:'visuals/emissions_biggest_vs_smallest.html',h:700},
  {q:'Show me revenue by division as a chart',a:'r',txt:'Same data, different view \u2014 <strong>donut</strong> for portfolio shares, <strong>horizontal bars</strong> for absolutes. The AI picks the right chart.',v:'visuals/revenue_by_division_chart.html',h:550},
  {q:'Show emissions intensity by revenue for all divisions',a:'re',txt:'<span class="ag ag-r">Revenue</span> + <span class="ag ag-e">Emissions</span> combined. <strong>E-Mobility: <span class="hl-c">563 t CO\u2082e/\u20acM</span></strong> \u2014 paradoxically the \"green\" division. This metric exists in neither dataset.',v:'visuals/emissions_intensity_by_division.html',h:700},
  {q:"Why is E-Mobility's intensity so high?",a:'re',txt:'The AI <strong>reasons</strong>: energy-intensive scale-up, denominator effect, grid carbon intensity. <span class="hl">Growth-stage effect, not structural flaw</span>.',v:'visuals/emobility_intensity_explanation.html',h:850},
  {q:'Show portfolio decarbonization priority quadrant',a:'re',txt:'<strong>Priority quadrant</strong>: revenue \u00d7 intensity. Powertrain & E-Mobility in <span class="hl-c">Critical Priority</span> \u2014 59% revenue, 67% emissions. <strong>2 divisions could shift the entire portfolio.</strong>',v:'visuals/decarbonization_priority_quadrant.html',h:900},
  {q:'Carbon price \u20ac150/t \u2014 cost impact per division?',a:'re',txt:'\u20ac150/t \u2192 <span class="hl-c">\u20ac1.58B carbon costs (6.7%)</span>. E-Mobility: <strong>8.4%</strong>. Powertrain: <strong>\u20ac627M</strong>. Every 1% intensity cut saves ~\u20ac15.8M/year.',v:'visuals/carbon_price_impact_150eur.html',h:850},
  {q:'Green revenue ratio?',a:'re',txt:'<strong>Green Revenue Ratio: <span class="hl">40.8%</span></strong>. <span class="hl-c">59.2%</span> from above-average divisions. A spontaneous KPI from combining both agents.',v:'visuals/green_revenue_ratio.html',h:900},
  {q:'Cross-cutting use cases?',a:'re',txt:'<strong>12 use cases in 3 tiers.</strong> Tier 1: today. Tier 2: enriched data. Tier 3: external agents. <span class="hl">The AI stays the same \u2014 the data scales.</span>',v:'visuals/cross_cutting_use_cases.html',h:1100}
];
var names=['start','revenue_overview','emissions_comparison','revenue_chart','emissions_intensity','emobility_paradox','priority_quadrant','carbon_price','green_revenue_ratio','use_case_roadmap'];
var sLabels=['Start','Revenue by division','Biggest vs smallest emitter','Revenue chart view','Emissions intensity','Why E-Mobility?','Priority quadrant','Carbon price impact','Green revenue ratio','Cross-cutting use cases'];
var sNums=['\u25cf','1','2','3','4','4b','5','6','7','8'];
var cur=0;
var bl=document.getElementById('beatList');
B.forEach(function(_,i){var d=document.createElement('div');d.className='bi'+(i===0?' a':'');d.innerHTML='<div class="bn">'+sNums[i]+'</div><div class="bl">'+sLabels[i]+'</div>';d.onclick=function(){jump(i)};bl.appendChild(d)});
function badges(a){var s='';if(a.indexOf('r')>=0)s+='<span class="ag ag-r">Revenue Agent</span> ';if(a.indexOf('e')>=0)s+='<span class="ag ag-e">Emissions Agent</span>';return s}
function render(i){
  var ch=document.getElementById('chat'),b=B[i];
  if(b.t==='hero'){ch.innerHTML='<div class="hero-w"><div class="hero"><div class="hero-badge">Interactive Demo</div><h1>AI-Powered<br><em>Sustainability Analytics</em></h1><p>Two Microsoft Fabric Data Agents \u2014 Revenue and Emissions \u2014 combined through Conversational AI. No dashboards. No ETL. Just questions that become strategic insights.</p><button class="hero-btn" onclick="go(1)">Start the demo \u2192</button><div class="hero-meta"><div><strong>9</strong>Beats</div><div><strong>2</strong>Data Agents</div><div><strong>12</strong>Use Cases</div><div><strong>1</strong>Conversation</div></div></div></div>';ch.scrollTop=0;return}
  ch.innerHTML='<div class="beat"><div class="umsg"><div class="ub">'+b.q+'</div></div><div class="ai-hd"><div class="av">C</div><div class="an">Claude <span>'+badges(b.a)+'</span></div></div><div class="ai-txt">'+b.txt+'</div><div class="vf"><div class="vl">Interactive visualization</div><iframe src="'+b.v+'" style="height:'+b.h+'px" sandbox="allow-scripts allow-same-origin"></iframe></div></div>';
  ch.scrollTop=0;
}
function updateUI(){document.querySelectorAll('.bi').forEach(function(el,i){el.className='bi'+(i===cur?' a':(i<cur?' v':''))});document.getElementById('ctr').innerHTML=cur===0?'<strong>Start</strong>':'Beat <strong>'+cur+'</strong> / '+(B.length-1);document.getElementById('prevBtn').disabled=cur===0;document.getElementById('nextBtn').disabled=cur>=B.length-1;document.getElementById('kh').className='kh'+(cur>0?' show':'')}
function track(i){if(typeof gtag==='function'){gtag('event','view_beat',{beat_number:i,beat_name:names[i],event_category:'demo_navigation'});if(i===B.length-1)gtag('event','demo_completed',{event_category:'engagement'})}if(typeof clarity==='function'){clarity('set','beat',names[i]);if(i===B.length-1)clarity('set','demo_completed','true')}}
function go(d){var n=cur+d;if(n<0||n>=B.length)return;cur=n;track(cur);render(cur);updateUI()}
function jump(i){cur=i;track(cur);render(cur);updateUI()}
document.addEventListener('keydown',function(e){if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();go(1)}else if(e.key==='ArrowLeft'){e.preventDefault();go(-1)}else if(e.key==='Escape'){jump(0)}});
render(0);updateUI();
</script>
</body>
</html>
